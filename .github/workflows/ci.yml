name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: gsk_ci_test_key
      NEXT_PUBLIC_SUPABASE_URL: https://resume-studio-ci.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci_anon_key
      SUPABASE_SERVICE_ROLE_KEY: ci_service_role_key
      POLAR_ACCESS_TOKEN: polar_ci_token
      POLAR_WEBHOOK_SECRET: whsec_ci_secret
      POLAR_PRO_PRODUCT_ID: prod_ci_plan
      UPSTASH_REDIS_REST_URL: https://resume-studio-ci.upstash.io
      UPSTASH_REDIS_REST_TOKEN: ci_upstash_token
      POLAR_SERVER: sandbox
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run verification pipeline
        run: pnpm build

      - name: Check bundle budget
        run: CHECK_BUNDLE_SIZE=1 pnpm build
